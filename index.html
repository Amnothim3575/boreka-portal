<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boreka Group | Tree Funding Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background: #022c22; min-height: 100vh; color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .step-hidden { display: none !important; }
        .glass-panel { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px; }
        .option-card { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; padding: 20px; transition: all 0.3s; cursor: pointer; text-align: center; }
        .option-card:hover { background: rgba(16, 185, 129, 0.1); border-color: #10b981; transform: translateY(-5px); }
        .card-selected { background: #10b981 !important; color: black !important; box-shadow: 0 0 20px rgba(16, 185, 129, 0.4); }
    </style>
</head>
<body class="flex flex-col">
    <header class="p-6 flex justify-between items-center relative z-10">
        <h1 class="text-2xl font-black tracking-tighter uppercase italic">Boreka <span class="text-emerald-500 underline">Group</span></h1>
    </header>

    <main class="flex-grow flex flex-col items-center justify-center p-6 relative z-10">
        <section id="st1" class="w-full max-w-6xl">
            <h2 class="text-center text-emerald-400 font-bold tracking-widest uppercase mb-8 text-sm">Choose Contribution Level</h2>
            <div id="grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4 mb-10"></div>

            <div class="glass-panel p-8">
                <div class="grid md:grid-cols-2 gap-8 items-center">
                    <div>
                        <h2 class="text-3xl font-black italic mb-2">Impact Analysis</h2>
                        <p id="stats-label" class="text-emerald-400 font-bold text-xl mb-6">Select a level</p>
                        <button onclick="showStep(2)" class="w-full bg-emerald-500 text-black font-black py-4 rounded-xl uppercase tracking-widest transition-transform hover:scale-105">Proceed to Checkout</button>
                    </div>
                    <div class="flex justify-around items-center">
                        <div class="w-24 h-24 text-center"><canvas id="goalChart"></canvas><span class="text-[10px] uppercase font-bold">Goal</span></div>
                        <div class="w-24 h-24 text-center"><canvas id="capChart"></canvas><span class="text-[10px] uppercase font-bold">Cap</span></div>
                    </div>
                </div>
            </div>
        </section>

        <section id="st2" class="step-hidden fixed inset-0 bg-[#022c22] flex flex-col items-center justify-center p-6 text-center z-50">
            <div class="text-[180px] mb-6">🌲</div>
            <h2 class="text-6xl font-black mb-4">SUCCESS</h2>
            <p class="text-emerald-400 text-lg italic mb-2">Project Contribution Verified</p>
            <p id="co2-val" class="text-white font-bold text-xl mb-10"></p>
            <button onclick="location.reload()" class="bg-white text-emerald-900 px-12 py-4 rounded-full font-bold text-lg hover:scale-105 transition-transform">PLANT ANOTHER</button>
        </section>
    </main>

    <script>
        const treeData = [
            {t: 1, p: 5, s: 1}, {t: 5, p: 25, s: 1}, {t: 15, p: 75, s: 1}, {t: 25, p: 125, s: 1}, 
            {t: 50, p: 250, s: 2}, {t: 100, p: 500, s: 4}, {t: 250, p: 1250, s: 5}, {t: 500, p: 2500, s: 10}, 
            {t: 1000, p: 5000, s: 15}, {t: 2500, p: 10000, s: 25}, {t: 5000, p: 20000, s: 50}, 
            {t: 10000, p: 40000, s: 100}, {t: 25000, p: 100000, s: 250}, {t: 50000, p: 200000, s: 500}, 
            {t: 75000, p: 300000, s: 750}, {t: 100000, p: 400000, s: 1000}, {t: 250000, p: 750000, s: 2500}, 
            {t: 500000, p: 1500000, s: 5000}, {t: 750000, p: 2250000, s: 7500}, {t: 1000000, p: 3000000, s: 10000}
        ];

        let chosen = 0, species = 0;
        const grid = document.getElementById('grid');

        treeData.forEach((d) => {
            const card = document.createElement('div');
            card.className = 'option-card';
            card.innerHTML = `<div class="text-2xl mb-1">🌲</div><div class="text-lg font-bold">${d.t.toLocaleString()}</div><div class="text-emerald-400 font-bold">$${d.p.toLocaleString()}</div>`;
            card.onclick = () => {
                document.querySelectorAll('.option-card').forEach(c => c.classList.remove('card-selected'));
                card.classList.add('card-selected');
                chosen = d.t; species = d.s;
                updateStats();
            };
            grid.appendChild(card);
        });

        const ctx1 = document.getElementById('goalChart').getContext('2d');
        const ctx2 = document.getElementById('capChart').getContext('2d');
        const cfg = (v, m) => ({ type: 'doughnut', data: { datasets: [{ data: [v, m-v], backgroundColor: ['#10b981', '#111827'], borderWidth: 0 }] }, options: { cutout: '80%', plugins: { tooltip: { enabled: false } } } });
        let gChart = new Chart(ctx1, cfg(0, 1000000));
        let sChart = new Chart(ctx2, cfg(0, 10000));

        function updateStats() {
            document.getElementById('stats-label').innerText = `${chosen.toLocaleString()} Trees | ${species.toLocaleString()} Species`;
            gChart.data.datasets[0].data = [chosen, 1000000 - chosen];
            sChart.data.datasets[0].data = [species, 10000 - species];
            gChart.update(); sChart.update();
        }

        function showStep(n) {
            if (n === 2 && chosen === 0) return alert("Select a level!");
            document.getElementById('st1').classList.add('step-hidden');
            document.getElementById('st2').classList.remove('step-hidden');
            document.getElementById('co2-val').innerText = `Offsetting ${(chosen * 22).toLocaleString()}kg of CO2 yearly`;
        }
    </script>
</body>
</html>
